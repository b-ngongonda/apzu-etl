# Drops and recreates the reporting utility objects (MySQL functions and
# stored procedures) used by downstream warehouse loads, in the order listed
# below. Each iteration runs the type-appropriate DROP statement and then
# executes the object's body file under jobs/pentaho/malawi/schema/<type>/<name>.sql.
#
# Functions and procedures use an empty delimiter so their BEGIN ... END bodies
# (which contain internal semicolons) are sent to the database as a single
# statement.
#
# Tables are NOT created here — they are managed per-table by
# refresh-mw-tables.yml (drop, create, load, index).
type: "iterating-job"
description: "Create reporting utilities (functions, procedures)"
configuration:
  maxConcurrentJobs: 1
  jobTemplate:
    path: "drop-and-create.yml"
  iterations:
    - { type: "function", name: "first_date_no_breastfeeding", delimiter: "" }
    - { type: "function", name: "first_test_result_by_date_entered", delimiter: "" }
    - { type: "function", name: "latest_test_result_by_date_entered", delimiter: "" }
    - { type: "function", name: "latest_diabetes_htn_visit", delimiter: "" }
    - { type: "function", name: "latest_asthma_visit", delimiter: "" }
    - { type: "function", name: "latest_epilepsy_visit", delimiter: "" }
    - { type: "function", name: "latest_mental_health_visit", delimiter: "" }
    - { type: "function", name: "latest_test_result_by_sample_date", delimiter: "" }
    - { type: "function", name: "get_regimen", delimiter: "" }
    - { type: "function", name: "get_regimen_start", delimiter: "" }
    - { type: "procedure", name: "create_last_art_outcome_at_facility", delimiter: "" }
    - { type: "procedure", name: "create_age_groups", delimiter: "" }
    - { type: "procedure", name: "create_last_art2_outcome_at_facility", delimiter: "" }
