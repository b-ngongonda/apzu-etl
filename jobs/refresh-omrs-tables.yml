# Refreshes the OMRS warehouse end-to-end. Each main warehouse table is its own
# self-contained job: drop, create (without indexes), load, then create indexes.
# Indexes are created per-table immediately after that table's load — fast for
# bulk inserts, and any cross-table joins by later loads still benefit.
type: "job-pipeline"
description: "Refresh OMRS warehouse"
configuration:
  jobs:

    # --- 1. Helper function used by downstream MySQL queries ---
    - type: "sql-execution"
      description: "Drop function nextStateForEnrollment"
      parameters:
        type: "function"
        name: "nextStateForEnrollment"
      configuration:
        datasource: "mysqlReporting.yml"
        delimiter: ";"
        scripts:
          - "sql/drop-schema-object.sql"
    - type: "sql-execution"
      description: "Create function nextStateForEnrollment"
      configuration:
        datasource: "mysqlReporting.yml"
        delimiter: ""    # function body has internal semicolons
        scripts:
          - "pentaho/openmrs/schema/function/nextStateForEnrollment.sql"

    # --- 2. Reference-data lookup tables (lookup_*); required before main-table
    #         loads. Each is a self-contained drop → create → load → index job. ---
    - type: "iterating-job"
      description: "Refresh OMRS reference-data lookup tables"
      parameters:
        baseDir: "pentaho/openmrs"
      configuration:
        maxConcurrentJobs: 1
        jobTemplate:
          path: "refresh-warehouse-table.yml"
        iterations:
          - { tableName: "lookup_concept" }
          - { tableName: "lookup_location" }
          - { tableName: "lookup_identifier_type" }
          - { tableName: "lookup_encounter_type" }
          - { tableName: "lookup_user" }
          - { tableName: "lookup_person_name" }
          - { tableName: "lookup_provider_name" }
          - { tableName: "lookup_form" }
          - { tableName: "lookup_drug" }
          - { tableName: "lookup_visit_type" }

    # --- 3. Standard 1:1 table refreshes (drop → create → load → index) ---
    - type: "iterating-job"
      description: "Refresh OMRS warehouse tables"
      parameters:
        baseDir: "pentaho/openmrs"
      configuration:
        maxConcurrentJobs: 1
        jobTemplate:
          path: "refresh-warehouse-table.yml"
        iterations:
          - { tableName: "omrs_patient" }
          - { tableName: "omrs_patient_identifier" }
          - { tableName: "omrs_relationship" }
          - { tableName: "omrs_visit" }
          - { tableName: "omrs_program_enrollment" }
          - { tableName: "omrs_program_state" }
          - { tableName: "omrs_encounter_provider" }
          - { tableName: "omrs_encounter" }

    # --- 4. omrs_obs + omrs_obs_group: a single .ktr writes to both tables ---
    - type: "job-pipeline"
      description: "Refresh omrs_obs and omrs_obs_group (loaded together by import-into-omrs-obs.ktr)"
      configuration:
        jobs:
          - type: "sql-execution"
            description: "Drop omrs_obs"
            parameters:
              type: "table"
              name: "omrs_obs"
            configuration:
              datasource: "mysqlReporting.yml"
              delimiter: ";"
              scripts:
                - "sql/drop-schema-object.sql"
          - type: "sql-execution"
            description: "Drop omrs_obs_group"
            parameters:
              type: "table"
              name: "omrs_obs_group"
            configuration:
              datasource: "mysqlReporting.yml"
              delimiter: ";"
              scripts:
                - "sql/drop-schema-object.sql"
          - type: "sql-execution"
            description: "Create omrs_obs and omrs_obs_group"
            configuration:
              datasource: "mysqlReporting.yml"
              delimiter: ";"
              scripts:
                - "pentaho/openmrs/schema/table/omrs_obs.sql"
                - "pentaho/openmrs/schema/table/omrs_obs_group.sql"
          - type: "iterating-job"
            description: "Load omrs_obs (also fills omrs_obs_group)"
            configuration:
              iterations:
                - jobPath: "pentaho/openmrs/transforms/import-into-omrs-obs.ktr"
              jobTemplate:
                path: "execute-pentaho-job.yml"
          - type: "sql-execution"
            description: "Index omrs_obs and omrs_obs_group"
            configuration:
              datasource: "mysqlReporting.yml"
              delimiter: ";"
              scripts:
                - "pentaho/openmrs/schema/index/omrs_obs.sql"
                - "pentaho/openmrs/schema/index/omrs_obs_group.sql"
