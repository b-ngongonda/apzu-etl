type: "job-pipeline"
description: "Refreshing OpenMRS data"
configuration:
  jobs:

    - type: "iterating-job"
      description: "Execute OpenMRS Pentaho pipeline"
      configuration:
        iterations:
          #- jobPath: "pentaho/openmrs/create-omrs-schema.kjb"
          #- jobPath: "pentaho/malawi/jobs/create-schema.kjb"
          #- jobPath: "pentaho/openmrs/load-from-openmrs.kjb"
          #- jobPath: "pentaho/openmrs/create-omrs-indexes.kjb"
          - jobPath: "pentaho/malawi/jobs/load-malawi-data-ART.kjb"
          - jobPath: "pentaho/malawi/jobs/load-malawi-data-NCD.kjb"
          - jobPath: "pentaho/malawi/jobs/load-malawi-data-PDC.kjb"
          - jobPath: "pentaho/malawi/jobs/load-malawi-data-Nutrition.kjb"
          - jobPath: "pentaho/malawi/jobs/load-malawi-data-POC.kjb"
          - jobPath: "pentaho/malawi/jobs/load-malawi-data-users.kjb"
        jobTemplate:
          path: "execute-pentaho-job.yml"

    - type: "iterating-job"
      description: "Refresh OpenMRS Derived MySQL Data"
      configuration:
        iterations:
          - datasourceName: "mysqlReporting"
        jobTemplate:
          path: "refresh-derived-mysql-data.yml"