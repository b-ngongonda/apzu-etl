type: "job-pipeline"
description: "Refreshing OpenMRS data"
configuration:
  jobs:

    - path: "refresh-omrs-tables.yml"

    - path: "create-reporting-utilities.yml"

    - path: "refresh-mw-tables.yml"

    - type: "iterating-job"
      description: "Refresh OpenMRS Derived MySQL Data"
      configuration:
        iterations:
          - datasourceName: "mysqlReporting"
        jobTemplate:
          path: "refresh-derived-mysql-data.yml"
