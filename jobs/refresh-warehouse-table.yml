# Per-iteration template that fully refreshes a single warehouse table:
#   1. drops the table if it exists
#   2. creates the table (without secondary indexes)
#   3. loads the table by running its Pentaho transform
#   4. creates the table's indexes (deferred for bulk-load performance)
#
# All four artifacts are looked up by ${tableName} under a single ${baseDir}:
#   ${baseDir}/schema/table/${tableName}.sql
#   ${baseDir}/schema/index/${tableName}.sql
#   ${baseDir}/transforms/${tableName}.ktr
#
# Iteration variables:
#   ${baseDir} - e.g., "pentaho/malawi" or "pentaho/openmrs"
#   ${tableName} - e.g., "mw_patient"; matches the .sql and .ktr basenames
type: "job-pipeline"
description: "Refresh ${tableName}"
configuration:
  jobs:
    - type: "sql-execution"
      description: "Drop ${tableName}"
      parameters:
        type: "table"
        name: "${tableName}"
      configuration:
        datasource: "mysqlReporting.yml"
        delimiter: ";"
        scripts:
          - "sql/drop-schema-object.sql"
    - type: "sql-execution"
      description: "Create ${tableName}"
      configuration:
        datasource: "mysqlReporting.yml"
        delimiter: ";"
        scripts:
          - "${baseDir}/schema/table/${tableName}.sql"
    - type: "iterating-job"
      description: "Load ${tableName}"
      configuration:
        iterations:
          - jobPath: "${baseDir}/transforms/${tableName}.ktr"
        jobTemplate:
          path: "execute-pentaho-job.yml"
    - type: "sql-execution"
      description: "Index ${tableName}"
      configuration:
        datasource: "mysqlReporting.yml"
        delimiter: ";"
        scripts:
          - "${baseDir}/schema/index/${tableName}.sql"
