# The purpose of this job is to the named Pentaho job, passed in as ${jobPath} parameter, where path is relative to the job file
type: "pentaho-job"
description: "Execute ${jobPath}"
parameters:
  pih.pentahoHome: "${petl.jobDir}/pentaho"
  openmrs.db.host: "${mysqlOpenmrs.host}"
  openmrs.db.port: "${mysqlOpenmrs.port}"
  openmrs.db.name: "${mysqlOpenmrs.databaseName}"
  openmrs.db.user: "${mysqlOpenmrs.user}"
  openmrs.db.password: "${mysqlOpenmrs.password}"
  warehouse.db.host: "${mysqlReporting.host}"
  warehouse.db.port: "${mysqlReporting.port}"
  warehouse.db.name: "${mysqlReporting.databaseName}"
  warehouse.db.user: "${mysqlReporting.user}"
  warehouse.db.password: "${mysqlReporting.password}"

configuration:
  job:
    filePath: "${jobPath}"
    logLevel: "BASIC"
  pih:
    pentahoHome: "${pih.pentahoHome}"
    country: "malawi"
  openmrs:
    db:
      host: "${openmrs.db.host}"
      port: "${openmrs.db.port}"
      name: "${openmrs.db.name}"
      user: "${openmrs.db.user}"
      password: "${openmrs.db.password}"
  warehouse:
    db:
      host: "${warehouse.db.host}"
      port: "${warehouse.db.port}"
      name: "${warehouse.db.name}"
      user: "${warehouse.db.user}"
      password: "${warehouse.db.password}"
      key_prefix: ""
